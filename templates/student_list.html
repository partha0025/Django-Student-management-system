<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
</head>
<body>

<h2>Student List</h2>

<form method="GET">
    <input type="text"
           placeholder="Search Student">

    <button type="submit">
        Search
    </button>
</form>

<br>

<a href="{% url 'add_student' %}">
    Add Student
</a>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Mobile</th>
    <th>Gender</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student.student_id }}</td>
    <td>{{ student.full_name }}</td>
    <td>{{ student.email }}</td>
    <td>{{ student.mobile }}</td>
    <td>{{ student.gender }}</td>

    <td>

        <a href="{% url 'update_student' student.pk %}">
            Edit
        </a>

        |

        <a href="{% url 'delete_student' student.pk %}">
            Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
